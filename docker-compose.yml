services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scraptheweb
      POSTGRES_USER: scraptheweb
      POSTGRES_PASSWORD: scraptheweb
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scraptheweb -d scraptheweb"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./backend
      target: api
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"]
    environment:
      APP_ENV: local
      LOG_LEVEL: info
      DATABASE_URL: postgresql+asyncpg://scraptheweb:scraptheweb@db:5432/scraptheweb
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: scraptheweb-local
      S3_REGION: us-east-1
      FRONTEND_ORIGIN: http://localhost:3000
      JWT_SECRET: local-dev-jwt-secret-change-me
      JWT_ACCESS_TOKEN_MINUTES: 15
      REFRESH_TOKEN_SECRET: local-dev-refresh-secret-change-me
      REFRESH_TOKEN_DAYS: 30
      RENDER_RESULT_TIMEOUT_SECONDS: 20
      PAGE_SESSION_TTL_SECONDS: 3600
      RENDER_NAVIGATION_TIMEOUT_MS: 20000
      RENDER_RATE_LIMIT_PER_HOUR: ${RENDER_RATE_LIMIT_PER_HOUR:-30}
      RECIPE_RUN_RATE_LIMIT_PER_HOUR: ${RECIPE_RUN_RATE_LIMIT_PER_HOUR:-20}
      EXPORT_RATE_LIMIT_PER_HOUR: ${EXPORT_RATE_LIMIT_PER_HOUR:-60}
      ORG_RENDER_QUOTA_PER_MONTH: ${ORG_RENDER_QUOTA_PER_MONTH:-200}
      ORG_RECIPE_RUN_QUOTA_PER_MONTH: ${ORG_RECIPE_RUN_QUOTA_PER_MONTH:-100}
      ORG_EXPORT_QUOTA_PER_MONTH: ${ORG_EXPORT_QUOTA_PER_MONTH:-500}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_CONSOLE_EXPORTER: ${OTEL_CONSOLE_EXPORTER:-false}
      OTEL_SERVICE_NAME_API: ${OTEL_SERVICE_NAME_API:-scraptheweb-api}
      EMAIL_VERIFICATION_TOKEN_HOURS: ${EMAIL_VERIFICATION_TOKEN_HOURS:-48}
      PASSWORD_RESET_TOKEN_MINUTES: ${PASSWORD_RESET_TOKEN_MINUTES:-30}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 12

  worker:
    build:
      context: ./backend
      target: worker
    command: ["arq", "app.worker.WorkerSettings"]
    environment:
      APP_ENV: local
      LOG_LEVEL: info
      DATABASE_URL: postgresql+asyncpg://scraptheweb:scraptheweb@db:5432/scraptheweb
      REDIS_URL: redis://redis:6379/0
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_BUCKET: scraptheweb-local
      S3_REGION: us-east-1
      JWT_SECRET: local-dev-jwt-secret-change-me
      JWT_ACCESS_TOKEN_MINUTES: 15
      REFRESH_TOKEN_SECRET: local-dev-refresh-secret-change-me
      REFRESH_TOKEN_DAYS: 30
      RENDER_RESULT_TIMEOUT_SECONDS: 20
      PAGE_SESSION_TTL_SECONDS: 3600
      RENDER_NAVIGATION_TIMEOUT_MS: 20000
      RENDER_RATE_LIMIT_PER_HOUR: ${RENDER_RATE_LIMIT_PER_HOUR:-30}
      RECIPE_RUN_RATE_LIMIT_PER_HOUR: ${RECIPE_RUN_RATE_LIMIT_PER_HOUR:-20}
      EXPORT_RATE_LIMIT_PER_HOUR: ${EXPORT_RATE_LIMIT_PER_HOUR:-60}
      ORG_RENDER_QUOTA_PER_MONTH: ${ORG_RENDER_QUOTA_PER_MONTH:-200}
      ORG_RECIPE_RUN_QUOTA_PER_MONTH: ${ORG_RECIPE_RUN_QUOTA_PER_MONTH:-100}
      ORG_EXPORT_QUOTA_PER_MONTH: ${ORG_EXPORT_QUOTA_PER_MONTH:-500}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      OTEL_CONSOLE_EXPORTER: ${OTEL_CONSOLE_EXPORTER:-false}
      OTEL_SERVICE_NAME_WORKER: ${OTEL_SERVICE_NAME_WORKER:-scraptheweb-worker}
      WORKER_METRICS_PORT: ${WORKER_METRICS_PORT:-9100}
      EMAIL_VERIFICATION_TOKEN_HOURS: ${EMAIL_VERIFICATION_TOKEN_HOURS:-48}
      PASSWORD_RESET_TOKEN_MINUTES: ${PASSWORD_RESET_TOKEN_MINUTES:-30}
      REQUIRE_EMAIL_VERIFICATION: ${REQUIRE_EMAIL_VERIFICATION:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    ports:
      - "9100:9100"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker_healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 12

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
      INTERNAL_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-}
      NEXT_PUBLIC_SENTRY_ENVIRONMENT: ${NEXT_PUBLIC_SENTRY_ENVIRONMENT:-local}
      NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${NEXT_PUBLIC_SENTRY_TRACES_SAMPLE_RATE:-0.0}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "healthcheck.mjs"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  postgres-data:
  minio-data:
