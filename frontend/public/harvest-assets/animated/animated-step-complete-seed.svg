<svg width="420" height="100" viewBox="0 0 420 100" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Step complete seed path animation">
  <style>
    .path { stroke-dasharray: 3 8; animation: dash 1.5s linear infinite; }
    .step { transition: fill .2s; }
    .active { animation: activePulse 1.5s ease-in-out infinite; transform-origin: center; }
    .seed { animation: move 2s ease-in-out infinite; opacity: 0; }
    @keyframes dash { to { stroke-dashoffset: -33; } }
    @keyframes activePulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.12); } }
    @keyframes move {
      0% { opacity: 0; transform: translate(0,0) scale(.7); }
      20%,70% { opacity: 1; }
      100% { opacity: 0; transform: translate(310px, 0) scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .path, .active, .seed { animation: none; opacity: .8; }
    }
  </style>
  <path class="path" d="M52 50 C124 16 174 84 246 50 S350 16 384 50" stroke="currentColor" stroke-width="1.5" opacity=".35"/>
  <circle cx="52" cy="50" r="16" fill="currentColor"/>
  <text x="52" y="55" text-anchor="middle" font-size="13" fill="white" font-family="monospace">1</text>
  <circle cx="134" cy="50" r="16" stroke="currentColor" stroke-width="2"/>
  <text x="134" y="55" text-anchor="middle" font-size="13" fill="currentColor" font-family="monospace">2</text>
  <circle class="active" cx="216" cy="50" r="16" fill="currentColor"/>
  <text x="216" y="55" text-anchor="middle" font-size="13" fill="white" font-family="monospace">3</text>
  <circle cx="298" cy="50" r="16" stroke="currentColor" stroke-width="2"/>
  <text x="298" y="55" text-anchor="middle" font-size="13" fill="currentColor" font-family="monospace">4</text>
  <circle cx="380" cy="50" r="16" stroke="currentColor" stroke-width="2"/>
  <text x="380" y="55" text-anchor="middle" font-size="13" fill="currentColor" font-family="monospace">5</text>
  <ellipse class="seed" cx="58" cy="50" rx="3" ry="5" fill="#B99A6B"/>
</svg>
