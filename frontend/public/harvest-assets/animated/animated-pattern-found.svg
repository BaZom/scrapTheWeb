<svg width="180" height="140" viewBox="0 0 180 140" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Pattern found animation">
  <style>
    .card { animation: cardPulse 1.7s ease-in-out infinite; transform-origin: 90px 72px; }
    .ring { animation: ring 1.7s ease-out infinite; transform-origin: 90px 72px; }
    .seed { animation: seedPop 1.7s ease-in-out infinite; transform-origin: center; }
    .s2 { animation-delay: .12s; }
    .s3 { animation-delay: .24s; }
    .s4 { animation-delay: .36s; }
    @keyframes cardPulse { 0%,100% { transform: scale(1); } 45% { transform: scale(1.025); } }
    @keyframes ring { 0% { opacity:.45; transform: scale(.92); } 80%,100% { opacity:0; transform: scale(1.18); } }
    @keyframes seedPop { 0% { opacity:0; transform: translate(0,0) scale(.6); } 30% { opacity:1; } 100% { opacity:0; transform: translate(var(--x), var(--y)) scale(1); } }
    @media (prefers-reduced-motion: reduce) {
      .card, .ring, .seed { animation:none; opacity:.7; }
    }
  </style>
  <rect class="ring" x="40" y="28" width="100" height="88" rx="18" stroke="currentColor" stroke-width="2"/>
  <rect class="card" x="46" y="34" width="88" height="76" rx="14" stroke="currentColor" stroke-width="2"/>
  <circle cx="60" cy="48" r="9" fill="currentColor"/>
  <path d="M73 62H115M73 77H106M73 92H121" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  <ellipse class="seed" style="--x:-34px;--y:-20px" cx="52" cy="44" rx="3" ry="5" fill="currentColor"/>
  <ellipse class="seed s2" style="--x:38px;--y:-28px" cx="128" cy="44" rx="3" ry="5" fill="#B99A6B"/>
  <ellipse class="seed s3" style="--x:-44px;--y:34px" cx="52" cy="104" rx="3" ry="5" fill="#B99A6B"/>
  <ellipse class="seed s4" style="--x:42px;--y:30px" cx="128" cy="104" rx="3" ry="5" fill="currentColor"/>
</svg>
