<svg width="300" height="160" viewBox="0 0 300 160" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Field picked animation">
  <style>
    .source { animation: sourcePulse 1.8s ease-in-out infinite; transform-origin: center; }
    .chip { animation: chipIn 1.8s ease-in-out infinite; transform-origin: center; }
    .line { stroke-dasharray: 4 8; animation: dash 1.2s linear infinite; }
    .seed { animation: seedMove 1.8s ease-in-out infinite; opacity: 0; }
    @keyframes sourcePulse { 0%,100% { transform: scale(1); } 40% { transform: scale(1.04); } }
    @keyframes chipIn { 0%,35% { opacity: .15; transform: translateX(12px); } 65%,100% { opacity: 1; transform: translateX(0); } }
    @keyframes dash { to { stroke-dashoffset: -32; } }
    @keyframes seedMove {
      0% { opacity: 0; transform: translate(0,0) scale(.6); }
      30% { opacity: 1; }
      100% { opacity: 0; transform: translate(126px,0) scale(1); }
    }
    @media (prefers-reduced-motion: reduce) {
      .source, .chip, .line, .seed { animation: none; opacity: .8; }
    }
  </style>
  <rect x="24" y="42" width="106" height="76" rx="12" stroke="currentColor" stroke-width="2"/>
  <path class="source" d="M46 68H108M46 88H94" stroke="currentColor" stroke-width="5" stroke-linecap="round"/>
  <path class="line" d="M136 80H186" stroke="currentColor" stroke-width="1.5" opacity=".45"/>
  <ellipse class="seed" cx="142" cy="80" rx="3" ry="5" fill="currentColor"/>
  <rect class="chip" x="188" y="56" width="88" height="48" rx="16" stroke="currentColor" stroke-width="2"/>
  <path class="chip" d="M206 80H256" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/>
  <circle class="chip" cx="258" cy="80" r="5" stroke="currentColor" stroke-width="2"/>
</svg>
